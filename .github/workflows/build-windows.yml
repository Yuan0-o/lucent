# ============================================================================================
#  Lucent — build the Windows desktop app (a single double-click installer .exe)
# ============================================================================================
#
# This is the DESKTOP pipeline. It is entirely separate from build.yml (the Android APK) and shares
# nothing with it — running one never affects the other, which is the requirement's first rule.
#
# What it does, in order:
#   1. Compile the optional native libraries on the Windows runner:
#        • lucent_llama.dll    — the on-device GGUF assistant (llama.cpp, CPU baseline), from the
#          SAME C++ the Android build uses (app/src/main/cpp), via desktop/native/CMakeLists.txt.
#        • lucent_llama_vk.dll — the SAME engine with llama.cpp's Vulkan GPU backend compiled in
#          (task A4 — Windows GPU support, mirroring Android). Best-effort: it needs the Vulkan
#          SDK, which is installed below with continue-on-error; if the SDK or this build fails,
#          the app simply ships CPU-only and the in-app GPU switch falls back to CPU. At runtime,
#          NativeLoader loads the _vk DLL only on machines that actually have vulkan-1.dll.
#        • lucent_native.dll   — the Rust crypto/animation accelerator (rust/), via cargo.
#      Both are OPTIONAL: the app has Kotlin/JCE fallbacks for every path they accelerate, so these
#      steps are `continue-on-error` — a first run still produces a working .exe even if a native
#      build needs a follow-up fix. When they succeed the DLLs are copied to the classpath resource
#      folder (desktop/src/main/resources/native) where NativeLoader looks for them.
#   2. Install WiX, which jpackage needs to produce a Windows .exe installer.
#   3. Package with Compose for Desktop (TargetFormat.Exe) and upload ONLY that one installer.
#
# Historically the flakiest part is a mid-build clone, so llama.cpp is fetched up front with retries
# into the directory the CMakeLists pre-seed hook checks first (mirrors the Android workflow).

name: Build Windows desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    # A Windows installer (WiX/jpackage) can only be produced on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # Same approach as build.yml: the wrapper isn't committed, so the action provides Gradle
        # 8.13 directly. Caching disabled so a GitHub cache-service hiccup can't surface as a warning.
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'
          cache-disabled: true

      # ---- llama.cpp source, fetched up front with retries (pinned b9888) ----
      # Cloned into the directory desktop/native/CMakeLists.txt pre-seeds from, so the compile step
      # never has to hit the network mid-build. PowerShell here because the runner is Windows.
      - name: Prefetch llama.cpp (pinned b9888)
        shell: pwsh
        run: |
          $dest = "desktop/native/llama.cpp-src"
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
            git clone --depth 1 --branch b9888 https://github.com/ggml-org/llama.cpp $dest
            if ($LASTEXITCODE -eq 0) { Write-Host "llama.cpp cloned on attempt $attempt"; break }
            if ($attempt -eq 3) { Write-Error "Failed to clone llama.cpp after 3 attempts."; exit 1 }
            Start-Sleep -Seconds 10
          }

      # ---- lucent_llama.dll (llama.cpp, CPU baseline) ----
      # continue-on-error: an on-device-model build failure must not block the whole installer — the
      # app runs fine without it (the local model just stays unavailable until the DLL is fixed).
      # This CPU build runs FIRST and is never mixed with the Vulkan build below, so a Vulkan
      # failure can only cost the GPU variant, never the baseline engine.
      - name: Build lucent_llama.dll (CMake, CPU baseline)
        continue-on-error: true
        shell: pwsh
        run: |
          cmake -S desktop/native -B desktop/native/build -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build desktop/native/build --config Release --parallel
          New-Item -ItemType Directory -Force -Path desktop/src/main/resources/native | Out-Null
          $dll = Get-ChildItem -Recurse -Path desktop/native/build -Filter lucent_llama.dll | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName desktop/src/main/resources/native/lucent_llama.dll -Force
            Write-Host "Copied $($dll.FullName)"
          } else {
            Write-Warning "lucent_llama.dll not found; the packaged app will run without the on-device model."
          }

      # ---- Vulkan SDK, for the optional GPU-enabled engine build (task A4) ----
      # Pinned LunarG SDK, installed silently the same way llama.cpp's own Windows CI does it.
      # Best-effort by design: no SDK just means no GPU variant this round. The whole install is
      # wrapped in try/catch and the step ends with `exit 0`, so it can NEVER fail the job AND
      # never leaves a red "Process completed with exit code 1" annotation on an otherwise-green
      # run — even if the pinned version is unpublished and the download returns an error page.
      # (continue-on-error stays as a second safety net.) On success the installer writes to
      # C:\VulkanSDK\<version> and VULKAN_SDK is exported via GITHUB_ENV, because the machine-wide
      # variable the installer sets isn't visible to a job that is already running; on any failure
      # VULKAN_SDK is left unset and the GPU-engine build below skips itself (CPU engine still ships).
      - name: Install Vulkan SDK
        continue-on-error: true
        shell: pwsh
        env:
          VULKAN_VERSION: 1.4.321.1
        run: |
          # Every failure path here is caught and turned into a warning + `exit 0`, so this step
          # never emits a red "exit code 1" annotation. When it can't install, VULKAN_SDK is left
          # unset and the GPU-engine build below skips itself; the CPU engine still ships.
          $ErrorActionPreference = 'Continue'
          try {
            # Download one candidate URL; $true only if it fetched a real PE binary.
            # -f makes curl FAIL on an HTTP error (e.g. an unpublished version -> 404) instead
            # of silently saving the error page as the .exe; the 'MZ' magic check catches any
            # error page that slipped through anyway. Every attempt is logged with its URL and
            # curl exit code, because the 2026-07-22 runs failing WITHOUT saying which URLs
            # were tried is exactly how this section stayed hard to debug.
            function Get-Installer([string]$url, [string]$dest) {
              Write-Host "trying: $url"
              curl.exe -fSL -o $dest $url
              if ($LASTEXITCODE -ne 0) { Write-Host "  -> curl exit $LASTEXITCODE"; return $false }
              $magic = Get-Content -Path $dest -AsByteStream -TotalCount 2 -ErrorAction Stop
              if ($magic.Count -lt 2 -or $magic[0] -ne 0x4D -or $magic[1] -ne 0x5A) {
                Write-Host "  -> not a PE binary (no 'MZ' header)"; return $false
              }
              Write-Host "  -> OK ($([math]::Round((Get-Item $dest).Length / 1mb)) MB)"
              return $true
            }
            # LunarG has shipped the Windows installer under several names over the years, and the
            # 2026-07-22 runs proved the classic VulkanSDK-<ver>-Installer.exe now 404s even for
            # the version their own latest/windows.txt reports. So: try every filename scheme
            # they've used, for the pinned version first (reproducibility), then the current
            # latest, then the version-independent "latest" alias URLs as the final net.
            $installer = "$env:RUNNER_TEMP\VulkanSDK-Installer.exe"
            $versions = @($env:VULKAN_VERSION)
            $latest = (curl.exe -fsSL "https://vulkan.lunarg.com/sdk/latest/windows.txt")
            if ($LASTEXITCODE -eq 0 -and $latest) {
              $latest = $latest.Trim()
              if ($latest -match '^\d+(\.\d+){1,3}$') {
                Write-Host "LunarG latest/windows.txt reports: $latest"
                if ($latest -ne $env:VULKAN_VERSION) { $versions += $latest }
              } else {
                Write-Host "latest/windows.txt returned something that is not a version: '$latest' - ignoring it."
              }
            } else {
              Write-Host "could not query latest/windows.txt (curl exit $LASTEXITCODE)."
            }
            $got = $false
            foreach ($ver in $versions) {
              foreach ($name in "VulkanSDK-$ver-Installer.exe", "vulkan_sdk.exe", "vulkansdk-windows-X64-$ver.exe", "vulkan-sdk.exe") {
                if (Get-Installer "https://sdk.lunarg.com/sdk/download/$ver/windows/$name" $installer) { $got = $true; break }
              }
              if ($got) { break }
            }
            if (-not $got) {
              foreach ($name in "vulkan_sdk.exe", "vulkan-sdk.exe") {
                if (Get-Installer "https://sdk.lunarg.com/sdk/download/latest/windows/$name" $installer) { $got = $true; break }
              }
            }
            $sdkPath = $null
            if ($got) {
              $proc = Start-Process -Wait -PassThru -FilePath $installer -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -ErrorAction Stop
              if ($proc.ExitCode -ne 0) { throw "installer exited with code $($proc.ExitCode)" }
              # Don't assume the directory name from the version string we asked for: an alias
              # download installs whatever version it actually is. Export the SDK dir that exists.
              $dir = Get-ChildItem "C:\VulkanSDK" -Directory -ErrorAction Stop | Sort-Object Name -Descending | Select-Object -First 1
              if (-not $dir) { throw "installer succeeded but C:\VulkanSDK contains no SDK directory" }
              $sdkPath = $dir.FullName
              Write-Host "Vulkan SDK $($dir.Name) installed at $sdkPath."
            } else {
              # ---- Plan B: LunarG is unreachable, so assemble a minimal SDK ourselves. ----
              # The GPU-engine build reads exactly three things out of VULKAN_SDK (via FindVulkan):
              #   Include\vulkan (+ spirv)  <- KhronosGroup/Vulkan-Headers (+ SPIRV-Headers)
              #   Lib\vulkan-1.lib          <- the import library, built from KhronosGroup/Vulkan-Loader
              #   Bin\glslc.exe             <- the shader compiler the runner's preinstalled Android NDK ships
              # None of that depends on LunarG's download site, and the produced DLL still merely
              # IMPORTS the end user's own vulkan-1.dll at runtime, exactly like an official-SDK
              # build — we ship no loader of our own.
              Write-Warning "No LunarG installer URL worked; assembling a minimal Vulkan SDK from Khronos sources instead."
              $mini = Join-Path $env:RUNNER_TEMP "vk-mini-sdk"
              New-Item -ItemType Directory -Force -Path "$mini\Include","$mini\Lib","$mini\Bin" | Out-Null
              $src = Join-Path $env:RUNNER_TEMP "vk-src"
              git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers "$src\headers"
              git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers "$src\spirv"
              git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Loader "$src\loader"
              foreach ($r in "headers","spirv","loader") { Write-Host ("  {0} @ {1}" -f $r, (git -C "$src\$r" rev-parse --short HEAD)) }
              cmake -S "$src\headers" -B "$src\headers\b" | Out-Null
              cmake --install "$src\headers\b" --prefix "$src\headers\out" | Out-Null
              Copy-Item -Recurse -Force "$src\headers\out\include\*" "$mini\Include\"
              Copy-Item -Recurse -Force "$src\spirv\include\spirv" "$mini\Include\"
              cmake -S "$src\loader" -B "$src\loader\b" -A x64 -DVULKAN_HEADERS_INSTALL_DIR="$src\headers\out" -DBUILD_TESTS=OFF
              cmake --build "$src\loader\b" --config Release --parallel
              $lib = Get-ChildItem -Recurse -Path "$src\loader\b" -Filter vulkan-1.lib | Select-Object -First 1
              if (-not $lib) { throw "Vulkan-Loader build produced no vulkan-1.lib" }
              Copy-Item $lib.FullName "$mini\Lib\vulkan-1.lib" -Force
              $ndkRoots = @($env:ANDROID_NDK_HOME, $env:ANDROID_NDK_ROOT, $env:ANDROID_NDK, $env:ANDROID_NDK_LATEST_HOME) | Where-Object { $_ }
              if ($env:ANDROID_SDK_ROOT) { $ndkRoots += (Get-ChildItem "$env:ANDROID_SDK_ROOT\ndk" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | ForEach-Object FullName) }
              $glslc = $ndkRoots | ForEach-Object { Join-Path $_ "shader-tools\windows-x86_64\glslc.exe" } | Where-Object { Test-Path $_ } | Select-Object -First 1
              if (-not $glslc) { throw "no glslc found in any preinstalled Android NDK (looked in: $($ndkRoots -join '; '))" }
              Write-Host "using NDK glslc: $glslc"
              Copy-Item $glslc "$mini\Bin\glslc.exe" -Force
              $sdkPath = $mini
              Write-Host "Minimal Vulkan SDK assembled at $sdkPath."
            }
            "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } catch {
            Write-Warning "Vulkan SDK unavailable ($($_.Exception.Message)); skipping the GPU engine build. The CPU engine still ships."
          }
          # A missing GPU SDK is an expected, harmless outcome - not a build failure.
          exit 0

      # ---- lucent_llama_vk.dll (llama.cpp, Vulkan GPU backend) ----
      # A SECOND build of the same engine, in its own build directory, with the GPU backend
      # compiled in. Also continue-on-error, and it checks for the SDK itself, so every failure
      # mode ends the same harmless way: the app ships with only the CPU engine.
      - name: Build lucent_llama_vk.dll (CMake, Vulkan GPU backend)
        continue-on-error: true
        shell: pwsh
        run: |
          if (-not $env:VULKAN_SDK -or -not (Test-Path $env:VULKAN_SDK)) {
            Write-Warning "Vulkan SDK unavailable; skipping the GPU engine build (the CPU engine above still ships)."
            exit 0
          }
          cmake -S desktop/native -B desktop/native/build-vk -A x64 -DCMAKE_BUILD_TYPE=Release -DLUCENT_ENABLE_VULKAN=ON
          cmake --build desktop/native/build-vk --config Release --parallel
          $dll = Get-ChildItem -Recurse -Path desktop/native/build-vk -Filter lucent_llama.dll | Select-Object -First 1
          if ($dll) {
            New-Item -ItemType Directory -Force -Path desktop/src/main/resources/native | Out-Null
            Copy-Item $dll.FullName desktop/src/main/resources/native/lucent_llama_vk.dll -Force
            Write-Host "Copied $($dll.FullName) as lucent_llama_vk.dll"
          } else {
            Write-Warning "Vulkan engine build produced no DLL; the app ships CPU-only (the GPU switch will fall back to CPU)."
          }

      # ---- lucent_native.dll (Rust accelerator) ----
      # Also optional: nativebridge/LucentNative has a Kotlin/JCE fallback for every function.
      - name: Set up Rust (MSVC target)
        continue-on-error: true
        shell: pwsh
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build lucent_native.dll (cargo)
        continue-on-error: true
        shell: pwsh
        run: |
          cargo build --release --manifest-path rust/Cargo.toml --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path desktop/src/main/resources/native | Out-Null
          $dll = "rust/target/x86_64-pc-windows-msvc/release/lucent_native.dll"
          if (Test-Path $dll) {
            Copy-Item $dll desktop/src/main/resources/native/lucent_native.dll -Force
            Write-Host "Copied $dll"
          } else {
            Write-Warning "lucent_native.dll not found; the app will use its Kotlin/JCE fallbacks."
          }

      # ---- WiX, required by jpackage to build a Windows .exe installer ----
      # ---- Prove at-rest encryption before anything gets packaged ----
      # The whole point of swapping the JDBC driver is that the desktop database is REALLY
      # encrypted. This runs a tiny end-to-end check against the driver Gradle actually resolved
      # (cipher core answers, file header scrambled, right key reads, wrong key rejected — see
      # desktop/src/main/kotlin/com/lucent/desktop/CipherSelfCheck.kt) and fails the job in red if
      # any of it is untrue. Encryption is a launch requirement, not best-effort: unlike the GPU
      # engine, this step is allowed to stop the build.
      - name: Verify database encryption (cipher self-check)
        shell: pwsh
        run: gradle :desktop:cipherSelfCheck --no-daemon --stacktrace

      # ---- Surface which engines actually made it into this build ----
      # A green run used to be silent about the one thing worth knowing here: whether the
      # best-effort GPU engine is in the installer, or the Vulkan chain quietly fell through
      # (as it did on 2026-07-22, when the pinned SDK download 404'd and the app shipped
      # CPU-only without a word). This step puts the answer on the run's summary page and
      # raises a yellow annotation when the GPU engine is missing, so nobody has to spelunk
      # step logs to learn what shipped.
      - name: Report bundled engines
        shell: pwsh
        run: |
          $dir = "desktop/src/main/resources/native"
          $rows = @()
          foreach ($name in "lucent_llama.dll","lucent_llama_vk.dll","lucent_native.dll") {
            $f = Join-Path $dir $name
            if (Test-Path $f) {
              $kb = [math]::Round((Get-Item $f).Length / 1kb)
              $rows += "| $name | bundled | $kb KB |"
            } else {
              $rows += "| $name | absent | - |"
            }
          }
          $summary = @("### Engines in this installer", "", "| DLL | Status | Size |", "|---|---|---|") + $rows
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if (Test-Path (Join-Path $dir "lucent_llama_vk.dll")) {
            Write-Host "::notice title=GPU engine bundled::lucent_llama_vk.dll is in this installer - the in-app GPU switch has a real backend on Vulkan-capable machines."
          } else {
            Write-Host "::warning title=GPU engine missing::lucent_llama_vk.dll was NOT produced - this installer is CPU-only and the in-app GPU switch will silently fall back. Check the 'Install Vulkan SDK' and 'Build lucent_llama_vk.dll' steps above."
          }
          if (-not (Test-Path (Join-Path $dir "lucent_llama.dll"))) {
            Write-Host "::warning title=CPU engine missing::lucent_llama.dll was NOT produced - local models will be unavailable in this build."
          }

      - name: Install WiX
        shell: pwsh
        run: choco install wixtoolset -y --no-progress

      # ---- Package the installer ----
      # packageDistributionForCurrentOS honours desktop/build.gradle.kts's TargetFormat.Exe and emits
      # the installer under desktop/build/compose/binaries/main/exe/.
      - name: Package Windows .exe
        shell: pwsh
        run: gradle :desktop:packageDistributionForCurrentOS --no-daemon --stacktrace

      # ---- Upload ONLY the one installer, as agreed ----
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lucent-windows-exe
          path: desktop/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
